services:
  - type: web
    name: i-am-the-one-saas-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn wsgi:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: APP_OWNER
        value: Andrew Wolverton
      - key: APP_BRAND
        value: I AM THE ONE™
      - key: APP_SYSTEM
        value: WOLF OS™
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: i-am-the-one-saas-frontend-live
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: SKIP_INSTALL_DEPS
        value: true
      - key: VITE_BACKEND_URL
        value: https://i-am-the-one-saas-api.onrender.com
      - key: VITE_SHOW_DEMO_PASSWORD
        value: false
      - key: VITE_OWNER_DEMO_PASSWORD
        value: ""
      - key: VITE_APP_MODE
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
